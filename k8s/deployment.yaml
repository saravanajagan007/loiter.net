apiVersion: apps/v1
kind: Deployment
metadata:
  name: loiter-web
  namespace: default
  labels:
    app: loiter
    tier: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: loiter
      tier: web
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: loiter
        tier: web
    spec:
      containers:
        - name: loiter-app
          image: ghcr.io/loiter/loiter-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: loiter-config
            - secretRef:
                name: loiter-secrets
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
